<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE SPR FTP DEX — My Files</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- ═══════════════════════════════════
     HEADER
     ═══════════════════════════════════ -->
<header class="header">
    <div class="header-left">
        <div class="header-logo">
            <img src="images/1spr.png" alt="1 SPR" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\'logo-fallback\'>SPR</span>';">
        </div>
        <span class="header-brand">ONE SPR FTP DEX</span>
    </div>
    <div class="header-center">
        <div class="search-bar">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Search files and folders..." oninput="handleSearch(this.value)">
        </div>
    </div>
    <div class="header-right">
        <div class="user-profile-widget" id="userProfileWidget">
            <div class="profile-avatar" id="profileAvatar">
                <img id="profileAvatarImg" src="" alt="" style="display:none; width:100%; height:100%; border-radius:50%; object-fit:cover;">
                <span id="profileAvatarInitial"></span>
            </div>
            <div class="profile-info">
                <div class="profile-name" id="profileName"></div>
                <div class="profile-email" id="profileEmail"></div>
            </div>
        </div>
        <button class="btn-signout" onclick="logout()">Sign Out</button>
    </div>
</header>

<!-- ═══════════════════════════════════
     MAIN LAYOUT
     ═══════════════════════════════════ -->
<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-inner">

            <!-- MY FILES (collapsible with folder tree) -->
            <div class="sidebar-section">
                <button class="sidebar-tab active" data-tab="drive" onclick="switchTab('drive')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke="currentColor" stroke-width="1.5"/></svg>
                    <span>My Files</span>
                    <span class="file-count" id="fileCountBadge">0</span>
                    <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </button>
                <div class="folder-tree" id="folderTree">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- SHARED WITH ME -->
            <div class="sidebar-section">
                <button class="sidebar-tab" data-tab="shared" onclick="switchTab('shared')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <span>Shared with me</span>
                </button>
            </div>

            <!-- STORAGE -->
            <div class="sidebar-storage">
                <div class="storage-header">
                    <span class="storage-label">Memory size</span>
                    <span class="storage-pct" id="storagePct">0%</span>
                </div>
                <div class="storage-bar"><div class="storage-fill" id="storageFill" style="width:0%"></div></div>
                <div class="storage-text" id="storageText">Calculating...</div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">

        <!-- BREADCRUMB -->
        <div class="breadcrumb-bar">
            <div class="breadcrumb" id="breadcrumb">
                <svg class="bc-home" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
            <div class="topbar-actions">
                <span class="sort-label">Date Added</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
        </div>

        <!-- DRAG & DROP OVERLAY -->
        <div class="drop-overlay" id="dropOverlay">
            <div class="drop-message">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <p>Drop files here to upload</p>
            </div>
        </div>

        <!-- FILE CONTAINER -->
        <div id="fileContainer" class="file-container"></div>

    </main>
</div>

<!-- ═══════════════════════════════════
     FLOATING UPLOAD BUTTON
     ═══════════════════════════════════ -->
<button class="fab" id="fabBtn" onclick="document.getElementById('fileInput').click();" title="Upload file">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
</button>
<input type="file" id="fileInput" multiple style="display:none;" onchange="uploadFile()">

<!-- ═══════════════════════════════════
     CONTEXT MENU (right-click on file)
     ═══════════════════════════════════ -->
<div class="context-menu" id="contextMenu">
    <button class="ctx-item" onclick="ctxShare()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Share</button>
    <button class="ctx-item" onclick="ctxDownload()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Download</button>
    <div class="ctx-divider"></div>
    <button class="ctx-item ctx-danger" onclick="ctxDelete()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Delete</button>
</div>

<!-- ═══════════════════════════════════
     NEW FOLDER MODAL
     ═══════════════════════════════════ -->
<div class="modal-overlay" id="folderModal">
    <div class="modal-box">
        <h3>New Folder</h3>
        <input type="text" id="folderNameInput" class="modal-input" placeholder="Untitled folder" onkeydown="if(event.key==='Enter') confirmCreateFolder()">
        <div class="modal-actions">
            <button class="modal-btn" onclick="closeFolderModal()">Cancel</button>
            <button class="modal-btn modal-btn-primary" onclick="confirmCreateFolder()">Create</button>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════
     SHARE MODAL
     ═══════════════════════════════════ -->
<div class="modal-overlay" id="shareModal" onclick="if(event.target===this) closeShareModal()">
    <div class="modal-box modal-box-wide" onclick="event.stopPropagation()">
        <div class="modal-top">
            <h3 id="shareFileName">Share</h3>
            <button class="modal-close" onclick="closeShareModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>
        <label class="modal-label">Add people</label>
        <div class="share-row">
            <input type="email" id="shareEmail" class="modal-input" placeholder="Enter email address">
            <select id="shareRole" class="modal-select">
                <option value="viewer">Viewer</option>
                <option value="editor">Editor</option>
            </select>
            <button class="modal-btn modal-btn-primary" onclick="shareWithUser()">Add</button>
        </div>
        <hr class="modal-divider">
        <label class="modal-label">General access</label>
        <select id="generalAccess" class="modal-select modal-select-full" onchange="updateGeneralAccess()">
            <option value="restricted">Restricted — Only people with access</option>
            <option value="domain">Your domain — Everyone in your organization</option>
            <option value="link">Anyone with the link</option>
        </select>
        <div id="shareLinkSection" style="display:none; margin-top:12px;">
            <div class="share-row">
                <input type="text" id="shareLinkDisplay" class="modal-input" readonly style="font-size:12px; font-family:var(--mono);">
                <button class="modal-btn" onclick="copyLink()">Copy</button>
            </div>
        </div>
        <div class="modal-actions" style="margin-top:16px;"><button class="modal-btn" onclick="closeShareModal()">Done</button></div>
    </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/dashboard.js"></script>
</body>
</html>
